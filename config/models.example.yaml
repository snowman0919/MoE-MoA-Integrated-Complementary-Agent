# Copy `models.yaml`, then change only verified repositories and pinned revisions.
gateway:
  model_name: dgx-moa
  bind_host: 127.0.0.1
  bind_port: 9000
  lifecycle_mode: disabled
  lifecycle_unit_map: {}
  loop_engineering:
    enabled: false
    defaults: {iterations: 4, tool_calls: 30, reasoner_reentries: 4, planner_calls: 2, reviewer_calls: 2, frontier_calls: 3, judge_calls: 2, tokens: 250000, external_cost_usd: 10, wall_clock_seconds: 1800}
    duplicate_fingerprint_limit: 2
    no_progress_iteration_limit: 2
    local_failures_before_frontier: 2
    request_class_overrides: {}
    risk_level_overrides: {}
  runtime_skills:
    enabled: false
    root: data/skills
    retrieval_limit: 3
    max_context_characters: 6000
  runtime_knowledge:
    enabled: false
    state_db: data/knowledge/knowledge.db
    retrieval_limit: 3
    max_context_characters: 6000
  runtime_evolution:
    enabled: false
    state_db: data/evolution/evolution.db
  remote_judge:
    enabled: false
    provider: disabled
    mode: selective
    model: glm-5.2
    endpoint: null
    api_key_env: OPENCODE_GO_API_KEY
    timeout_seconds: 120
    max_retries: 1
    max_calls_per_request: 2
    fail_closed_for: [production_deployment, destructive_migration, production_skill_promotion, security_sensitive_change]
  specialist_routing:
    enabled: false
    provider: disabled
    endpoint: https://opencode.ai/zen/go
    api_key_env: OPENCODE_GO_API_KEY
    models: {planner: deepseek-v4-pro, reviewer: deepseek-v4-flash}
    timeout_seconds: 120
    local_latency_seconds: {planner: 30, reviewer: 45}
    remote_latency_seconds: {planner: 25, reviewer: 5}
    remote_min_completion_tokens: {planner: 4096, reviewer: 2048}
    network_latency_seconds: 0.25
    remote_queue_latency_seconds: 0.5
    local_preference_margin_seconds: 5
    cost_seconds_per_usd: 60
    remote_cost_per_million_tokens_usd: 0
    warmup_watch_seconds: 1200
    race_mode_enabled: false
  declarative_policy:
    enabled: false
    version: development-disabled
    policies: []
  live_observation:
    enabled: false
    level: normal
    include_prompt: false
    include_reasoner_artifact: false
    max_content_characters: 2000
    queue_size: 256
    batch_size: 10
    batch_interval_seconds: 2
    request_timeout_seconds: 10
    controls:
      enabled: false
      nonce_ttl_seconds: 300
      allowed_users: {}
      role_permissions: {}
  training_data:
    enabled: false
    state_db: data/training-staging/training.db
    object_root: data/training-staging/objects
    minimum_free_bytes: 10000000000
    maximum_object_bytes: 1000000
    repository_policies: {}
    external_output_permitted: false
  weekly_jobs:
    enabled: false
    timezone: Asia/Seoul
    skill_schedule: "0 3 * * 0"
    package_schedule: "0 2 * * 1"
    package_root: data/weekly-packages
    archive_registry: data/archive-registry/weekly.db
    minimum_free_bytes: 10000000000
    retention:
      raw_operational_days: 30
      sanitized_candidate_days: 90
      weekly_archive_weeks: 52
      quarantine_days: 14
      failed_staging_days: 7
  lifecycle:
    minimum_samples: 20
    recent_sample_window: 100
    percentile: 0.75
    multiplier: 1.5
    load_unload_cooldown_seconds: 300
    continuation_lease_ttl_seconds: 900
    failure_limit: 3
    failure_window_seconds: 900
    roles:
      executor: {enabled: true, normally_resident: true, idle_unload_enabled: false, fallback_timeout_seconds: 14400, minimum_timeout_seconds: 7200, maximum_timeout_seconds: 28800, minimum_ready_residency_seconds: 600}
      planner: {enabled: true, normally_resident: false, idle_unload_enabled: true, fallback_timeout_seconds: 1200, minimum_timeout_seconds: 600, maximum_timeout_seconds: 3600, minimum_ready_residency_seconds: 600}
      reviewer: {enabled: true, normally_resident: false, idle_unload_enabled: true, fallback_timeout_seconds: 1200, minimum_timeout_seconds: 600, maximum_timeout_seconds: 3600, minimum_ready_residency_seconds: 600}
      reasoner: {enabled: true, normally_resident: true, idle_unload_enabled: false, fallback_timeout_seconds: 600, minimum_timeout_seconds: 300, maximum_timeout_seconds: 1800, minimum_ready_residency_seconds: 300}
      judge: {enabled: false, normally_resident: false, idle_unload_enabled: false, fallback_timeout_seconds: 600, minimum_timeout_seconds: 300, maximum_timeout_seconds: 1800, minimum_ready_residency_seconds: 300}
models: {}
# Optional prepared adapter field under a complete executor entry:
# lora_adapter: /path/to/adapter
