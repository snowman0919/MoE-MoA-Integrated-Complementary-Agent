services:
  gateway:
    build: .
    network_mode: host
    env_file: .env
    environment:
      DGX_MOA_PROJECT_ROOT: /app
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/healthz')"]
      interval: 10s
      timeout: 2s
      retries: 6

